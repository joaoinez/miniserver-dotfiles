---
services:
  opennotebook:
    image: lfnovo/open_notebook:v1-latest
    container_name: open-notebook
    restart: unless-stopped
    network_mode: service:tailscale-open-notebook
    environment:
      - OPEN_NOTEBOOK_ENCRYPTION_KEY=${OPEN_NOTEBOOK_ENCRYPTION_KEY:?OPEN_NOTEBOOK_ENCRYPTION_KEY
        must be set}
      - SURREAL_URL=ws://surrealdb:8000/rpc
      - SURREAL_USER=root
      - SURREAL_PASSWORD=root
      - SURREAL_NAMESPACE=open_notebook
      - SURREAL_DATABASE=open_notebook
    volumes:
      - notebook-data:/app/data
    depends_on:
      - surrealdb
      - tailscale-open-notebook

  surrealdb:
    image: surrealdb/surrealdb:v2
    container_name: open-notebook-surrealdb
    restart: unless-stopped
    command: start --log info --user root --pass root rocksdb:/mydata/mydatabase.db
    user: root
    volumes:
      - surreal-data:/mydata

  tailscale-open-notebook:
    image: tailscale/tailscale:latest
    container_name: ts-open-notebook
    hostname: open-notebook
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY must be set}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ts-serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./:/config:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  notebook-data:
  surreal-data:
  tailscale-state:
