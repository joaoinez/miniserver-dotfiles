---
services:
  hermes:
    image: nousresearch/hermes-agent:main@sha256:7a47d19ed1d4fa98f178756fd33772c914d9853e414e8366c268773f55517944
    container_name: hermes
    restart: unless-stopped
    network_mode: service:tailscale-hermes
    command: gateway run
    # ports:
    #   - "8642:8642"
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - HERMES_DASHBOARD=1
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
    # security_opt:
    #   - no-new-privileges:true
    # cap_drop:
    #   - ALL
    # cap_add:
    #   - CHOWN
    #   - SETUID
    #   - SETGID
    depends_on:
      - tailscale-hermes

  tailscale-hermes:
    image: tailscale/tailscale:v1.98.3
    container_name: ts-hermes
    hostname: hermes
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY must be set}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ts-serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./:/config:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  tailscale-state:
