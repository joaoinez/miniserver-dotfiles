---
services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    restart: unless-stopped
    network_mode: service:tailscale-navidrome
    volumes:
      - "navidrome:/data"
      - "/Users/miniserver/Music:/music:ro"

  tailscale-navidrome:
    image: tailscale/tailscale:latest
    container_name: ts-navidrome
    hostname: navidrome
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY must be set}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ts-serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./:/config:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  navidrome:
  tailscale-state:
