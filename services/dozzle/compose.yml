---
services:
  dozzle:
    image: amir20/dozzle:v10.5.0
    container_name: dozzle
    restart: unless-stopped
    network_mode: service:tailscale-dozzle
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - tailscale-dozzle

  tailscale-dozzle:
    image: tailscale/tailscale:latest
    container_name: ts-dozzle
    hostname: dozzle
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY must be set}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ts-serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./:/config:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  tailscale-state:
