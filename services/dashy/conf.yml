---
pageInfo:
  title: Mini Server
appConfig:
  disableConfiguration: true
sections:
  - name: System
    widgets:
      - type: clock
        options:
          timeZone: Europe/Amsterdam
          format: en-US
          hideDate: false
      - type: gl-current-cpu
        options:
          hostname: http://host.docker.internal:61208
      - type: gl-alerts
        options:
          hostname: http://host.docker.internal:61208
      - type: gl-network-traffic
        options:
          hostname: http://host.docker.internal:61208
          limit: 500
  - name: CPU
    widgets:
      - type: gl-current-cpu
        options:
          hostname: http://host.docker.internal:61208
      - type: gl-cpu-history
        options:
          hostname: http://host.docker.internal:61208
          limit: 60
  - name: Memory
    widgets:
      - type: gl-current-mem
        options:
          hostname: http://host.docker.internal:61208
      - type: gl-mem-history
        options:
          hostname: http://host.docker.internal:61208
          limit: 80
