---
pageInfo:
  title: Miniserver
appConfig:
  preventWriteToDisk: true
  preventLocalSave: true
  disableConfiguration: true
  theme: glow-dark
  glass:
    primary: "#fff"
    background: "#190842"
    background-darker: "#190842"
    font-headings: '"Roboto","Segoe UI","Ariel","sans-serif"'
    font-body: '"Roboto","Segoe UI","Ariel","sans-serif"'
    font-monospace: '"PTMono","Courier New",monospace'
  glass-2:
    primary: "#fff"
    background: "#190842"
    background-darker: "#190842"
    font-headings: '"Roboto","Segoe UI","Ariel","sans-serif"'
    font-body: '"Roboto","Segoe UI","Ariel","sans-serif"'
    font-monospace: '"PTMono","Courier New",monospace'
  layout: auto
  iconSize: medium
sections:
  - name: System
    widgets:
      - type: clock
        options:
          timeZone: Europe/Amsterdam
          format: en-US
          hideDate: false
      - type: gl-current-cpu
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-alerts
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-network-traffic
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
          limit: 500
  - name: Apps
    items:
      - title: Open WebUI
        icon: generative
        url: https://chat.sphynx-ule.ts.net
      - title: WakaTime
        icon: generative
        url: https://wakapi.sphynx-ule.ts.net
  - name: Services
    items:
      - title: Glances
        icon: generative
        url: https://miniserver.sphynx-ule.ts.net:61208
      - title: Dozzle
        icon: generative
        url: https://dozzle.sphynx-ule.ts.net
      - title: Jellyfin
        icon: generative
        url: https://miniserver.sphynx-ule.ts.net:8920
      - title: Navidrome
        icon: generative
        url: https://navidrome.sphynx-ule.ts.net
  - name: CPU
    widgets:
      - type: gl-current-cpu
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-cpu-history
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
          limit: 60
  - name: Memory
    widgets:
      - type: gl-current-mem
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-mem-history
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
          limit: 80
