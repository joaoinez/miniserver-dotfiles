---
pageInfo:
  title: Mini Server
appConfig:
  preventWriteToDisk: true
  preventLocalSave: true
  disableConfiguration: true
sections:
  - name: System
    widgets:
      - type: clock
        options:
          timeZone: Europe/Amsterdam
          format: en-US
          hideDate: false
      - type: gl-current-cpu
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-alerts
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-network-traffic
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
          limit: 500
  - name: CPU
    widgets:
      - type: gl-current-cpu
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
      - type: gl-cpu-history
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
          limit: 60
  - name: Memory
    widgets:
      - type: gl-current-mem
        options:
          hostname: https://miniserver.sphynx-ule.ts.net:61208
