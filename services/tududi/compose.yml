---
services:
  tududi:
    image: chrisvel/tududi:1.0.0
    container_name: tududi
    network_mode: service:tailscale-tududi
    restart: unless-stopped
    environment:
      - TUDUDI_USER_EMAIL=joaoinez.info@gmail.com
      - TUDUDI_USER_PASSWORD=${TUDUDI_USER_PASSWORD:?TUDUDI_USER_PASSWORD must
        be set}
      - TUDUDI_SESSION_SECRET=${TUDUDI_SESSION_SECRET:?TUDUDI_SESSION_SECRET
        must be set}
      - TUDUDI_ALLOWED_ORIGINS=https://tududi.sphynx-ule.ts.net
      - TUDUDI_TRUST_PROXY=true
      - TUDUDI_UPLOAD_PATH=/app/backend/uploads
      # Runtime UID/GID configuration - set these to match your host user/group
      - PUID=${PUID:?PUID must be set}
      - PGID=${PGID:?PGID must be set}
    volumes:
      - tududi-db:/app/backend/db
      - tududi-uploads:/app/backend/uploads
    depends_on:
      - tailscale-tududi

  tailscale-tududi:
    image: tailscale/tailscale:latest
    container_name: ts-tududi
    hostname: tududi
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY:?TS_AUTHKEY must be set}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=false
      - TS_SERVE_CONFIG=/config/ts-serve-config.json
    volumes:
      - tailscale-state:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
      - ./:/config:ro
    cap_add:
      - NET_ADMIN
    restart: unless-stopped

volumes:
  tududi-db:
  tududi-uploads:
  tailscale-state:
